<template id="page-accueil-mois-template">
    <style></style>
    <header class="page-header"></header>
    <div class="body-layout">
        <aside class="leftbar">
            <div class="view-selector">
                <button class="view-btn" data-view="jour" title="Jour">📅 Jour</button>
                <button class="view-btn" data-view="semaine" title="Semaine">📊 Semaine</button>
                <button class="view-btn" data-view="mois" title="Mois">📆 Mois</button>
            </div>
            <div class="calendar-nav">
                <button class="nav-btn prev-month" title="Mois précédent">← Prec.</button>
                <button class="nav-btn curr-month" title="Mois actuel">Auj.</button>
                <button class="nav-btn next-month" title="Mois suivant">Suiv. →</button>
            </div>
        </aside>
        <main class="content" id="month-content"></main>
    </div>
    <div class="day-modal-backdrop" style="display: none;"></div>
</template>
